name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies & security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt bandit pip-audit
          
      - name: Static Application Security Testing (SAST) with Bandit
        run: bandit -r app/ -ll -ii
        
      - name: Dependency Vulnerability Scan with pip-audit
        run: pip-audit -r requirements.txt

  unit-tests:
    runs-on: ubuntu-latest
    needs: security-and-linting
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
          
      - name: Run Unit Tests
        run: pytest tests/ -v

  build-and-scan-container:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Build Docker image
        run: docker build -t secure-app:latest .
        
      - name: Container Vulnerability Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-app:latest'
          format: 'table'
          exit-code: '1' # Fails the pipeline if vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-scan-container
    steps:
      - name: Simulate Production Deployment
        run: |
          echo "All tests and security scans passed."
          echo "Pushing secure-app:latest to container registry..."
          sleep 1
          echo "Updating Kubernetes manifests..."
          sleep 1
          echo "✅ Deployment successful! The application is live."